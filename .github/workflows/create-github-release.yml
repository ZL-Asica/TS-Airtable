name: Create GitHub Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Existing version to publish, with or without the v prefix
        required: true
        type: string

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: create-github-release-${{ github.event.inputs.version || github.sha }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.detect.outputs.is_release }}
      version: ${{ steps.detect.outputs.version }}
      is_prerelease: ${{ steps.detect.outputs.is_prerelease }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.sha }}

      - name: Detect release PR
        id: detect
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("node:fs");
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const releasePattern = /^v?([0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?)$/;
            const releaseTitlePattern = /^release:\s+v([0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?)$/;
            const releaseBranchPattern = /^release\/v([0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?)$/;

            const extractReleaseNotes = (body) => {
              const notesMatch = body.match(/##\s*Release notes\s*([\s\S]*)/i);
              const notes = notesMatch ? notesMatch[1] : body;
              return notes.replace(/[ \t]+$/gm, "").trim();
            };

            const readChangelogSection = (version) => {
              if (!fs.existsSync("CHANGELOG.md")) return "";

              const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
              const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const heading = new RegExp(
                `^##\\s+(?:\\[v?${escapedVersion}\\]\\([^\\n)]+\\)|\\[v?${escapedVersion}\\]|v?${escapedVersion})(?:\\s+-\\s+[^\\n]*)?\\s*$`,
                "im",
              );
              const match = changelog.match(heading);
              if (!match || match.index === undefined) return "";

              const bodyStart = match.index + match[0].length;
              const nextHeading = changelog.slice(bodyStart).search(/^##\s+/m);
              const bodyEnd = nextHeading === -1
                ? changelog.length
                : bodyStart + nextHeading;

              return changelog.slice(bodyStart, bodyEnd).trim();
            };

            const setReleaseOutputs = ({ version, isPrerelease, body }) => {
              core.setOutput("is_release", "true");
              core.setOutput("version", version);
              core.setOutput("is_prerelease", isPrerelease ? "true" : "false");
              core.setOutput("body", body);
            };

            if (context.eventName === "workflow_dispatch") {
              const inputVersion = (context.payload.inputs?.version || "").trim();
              const version = inputVersion.match(releasePattern)?.[1];
              if (!version) {
                core.setFailed(`Invalid release version input: ${inputVersion}`);
                return;
              }

              let body = "";
              try {
                const release = await github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag: `v${version}`,
                });
                body = (release.data.body || "").trim();
              }
              catch (error) {
                if (error.status !== 404) throw error;
                core.info(`No existing GitHub Release found for v${version}; it will be created if needed.`);
              }

              body ||= readChangelogSection(version);
              setReleaseOutputs({
                version,
                isPrerelease: version.includes("-"),
                body,
              });
              return;
            }

            const findReleasePr = (prs) => prs.find((pr) => {
              const title = pr.title || "";
              const branch = pr.head?.ref || "";
              const labels = pr.labels?.map((label) => label.name) || [];
              return labels.includes("release")
                && releaseTitlePattern.test(title)
                && releaseBranchPattern.test(branch);
            });

            const commitShas = [
              sha,
              ...(context.payload.commits || []).map((commit) => commit.id),
            ].filter(Boolean);
            const uniqueCommitShas = [...new Set(commitShas)];

            let releasePr;
            for (const commitSha of uniqueCommitShas) {
              const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: commitSha,
              });
              releasePr = findReleasePr(prs.data);
              if (releasePr) break;
            }

            if (!releasePr) {
              core.setOutput("is_release", "false");
              return;
            }

            const titleMatch = (releasePr?.title || "").match(releaseTitlePattern);
            const branchMatch = (releasePr?.head?.ref || "").match(releaseBranchPattern);
            const version = titleMatch?.[1] || branchMatch?.[1];
            if (!version) {
              core.setFailed("Could not parse release version from push payload.");
              return;
            }

            const body = extractReleaseNotes(releasePr?.body || "") || readChangelogSection(version);
            setReleaseOutputs({
              version,
              isPrerelease: version.includes("-"),
              body,
            });

      - name: Stop if not a release commit
        if: steps.detect.outputs.is_release != 'true'
        run: echo "Not a release commit. Skip tag and release creation."

      - name: Set tag name
        if: steps.detect.outputs.is_release == 'true'
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ steps.detect.outputs.version }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check package version
        if: steps.detect.outputs.is_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_VERSION="${{ steps.detect.outputs.version }}"

          echo "Release PR version: $RELEASE_VERSION"
          echo "package.json:       $PKG_VERSION"

          if [ "$PKG_VERSION" != "$RELEASE_VERSION" ]; then
            echo "package.json version does not match release PR version."
            exit 1
          fi

      - name: Check if tag already exists
        if: steps.detect.outputs.is_release == 'true'
        id: tag_exists
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.detect.outputs.is_release == 'true' && steps.tag_exists.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.detect.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.detect.outputs.body }}
          draft: false
          prerelease: ${{ steps.detect.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.detect.outputs.is_prerelease == 'true' && 'false' || 'legacy' }}

  publish-npm:
    name: Publish to npm
    needs: release
    if: needs.release.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: package.json

      - name: Setup Node.js for npm
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and test
        run: |
          pnpm run lint
          pnpm run test:ci

      - name: Build package
        run: pnpm build

      - name: Check package version
        shell: bash
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_VERSION="${{ needs.release.outputs.version }}"

          echo "Release version: $RELEASE_VERSION"
          echo "package.json:    $PKG_VERSION"

          if [ "$PKG_VERSION" != "$RELEASE_VERSION" ]; then
            echo "package.json version does not match release version."
            exit 1
          fi

      - name: Check npm version
        id: npm_version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ needs.release.outputs.version }}"

          if npm view ts-airtable@"$RELEASE_VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "ts-airtable@$RELEASE_VERSION is already published."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_version.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          DIST_TAG="${{ needs.release.outputs.is_prerelease == 'true' && 'beta' || 'latest' }}"
          pnpm publish --access public --no-git-checks --provenance --tag "$DIST_TAG"
